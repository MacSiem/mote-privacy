<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy — Mote</title>
    <link rel="alternate" hreflang="pl" href="https://macsiem.github.io/mote-privacy/pl/">
    <link rel="alternate" hreflang="en" href="https://macsiem.github.io/mote-privacy/en/">
    <link rel="alternate" hreflang="x-default" href="https://macsiem.github.io/mote-privacy/">
    <script>
        (function () {
            // Auto-redirect based on browser language. Polski default.
            try {
                var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
                var target = lang.indexOf('pl') === 0 ? 'pl/' : 'en/';
                window.location.replace(target);
            } catch (e) {
                window.location.replace('pl/');
            }
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #333; background-color: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .picker { text-align: center; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 400px; }
        h1 { color: #7c3aed; font-size: 1.5em; margin-bottom: 20px; }
        .links a { display: inline-block; margin: 8px; padding: 12px 24px; border: 1px solid #7c3aed; border-radius: 8px; color: #7c3aed; text-decoration: none; font-weight: 500; }
        .links a:hover { background: #7c3aed; color: #fff; }
    </style>
</head>
<body>
<noscript>
    <!-- Fallback dla przegladarek bez JS — meta refresh do PL. -->
    <meta http-equiv="refresh" content="0;url=pl/">
</noscript>
<div class="picker">
    <h1>Privacy Policy — Mote</h1>
    <p>Choose your language / Wybierz język:</p>
    <div class="links">
        <a href="pl/">Polski</a>
        <a href="en/">English</a>
    </div>
</div>
</body>
</html>
